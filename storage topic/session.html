<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session</title>
    <style>
        body{
            text-align: center;
            margin: 200px;
        }
        .card
        {
            width: 300px;
            height: 200px;
            margin: auto;
            padding: 20px;
            background-color: rgb(192, 233, 115);
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }
        button{
            
             margin-top: 80px;
            border-radius: 10px;
            padding: 15px;
            margin-right: 15px;
            background-color: rgb(42, 222, 26);
        }
        button:hover{
            background-color: rgb(243, 201, 19);
        }
    </style>
</head>
<body>
    <div class="card">
        <button onclick="increase()">Click</button>
        <button onclick="cleardata()">Clear</button>
        <p id="count"></p>
        <script>
            function increase()
            {
                let count=sessionStorage.getItem("counter")||0;
                count++;
                sessionStorage.setItem("counter", count);
                document.getElementById("count").innerText=count;
            }
            function cleardata()
            {
               sessionStorage.removeItem("counter");
               document.getElementById("count").innerText="session cleared !!!" ;
            }
        </script>
    </div>
</body>
</html>
